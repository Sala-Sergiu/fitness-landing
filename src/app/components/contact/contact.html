<section id="contact" class="px-6 py-16">
  <div class="mx-auto max-w-sm">
    <div class="mb-10 text-center">
      <p class="animate-fade-in mb-2 text-sm font-semibold uppercase tracking-widest text-lime-400">
        Hai să vorbim
      </p>
      <h2 class="animate-fade-in text-3xl font-bold" style="animation-delay: 0.1s;">
        Contactează-mă
      </h2>
    </div>
    <div class="flex flex-col gap-4">
      <a [href]="'tel:' + coach.phone"
         class="animate-slide-up block w-full rounded-full bg-lime-400 py-4 text-center font-semibold text-neutral-950 transition-transform duration-200 hover:scale-105"
         style="animation-delay: 0.2s;">
        📞 Sună acum!
      </a>
      <a [href]="'mailto:' + coach.email"
         class="animate-slide-up block w-full rounded-full bg-neutral-800 py-4 text-center font-semibold text-white transition-all duration-200 hover:scale-105 hover:bg-neutral-700"
         style="animation-delay: 0.3s;">
        ✉️ Trimite email
      </a>
      <a [href]="coach.messengerUrl" target="_blank"
         class="animate-slide-up block w-full rounded-full bg-neutral-800 py-4 text-center font-semibold text-white transition-all duration-200 hover:scale-105 hover:bg-neutral-700"
         style="animation-delay: 0.4s;">
        💬 Messenger
      </a>
      <a [href]="coach.instagramUrl" target="_blank"
         class="animate-slide-up block w-full rounded-full bg-neutral-800 py-4 text-center font-semibold text-white transition-all duration-200 hover:scale-105 hover:bg-neutral-700"
         style="animation-delay: 0.5s;">
        📸 Instagram
      </a>
    </div>
  </div>
</section>
