<section class="px-6 py-16 sm:py-24">
  <div class="mx-auto flex max-w-5xl flex-col items-center gap-12 lg:flex-row">

    <!-- Stânga: text -->
    <div class="flex-1 text-center lg:text-left">
      <p class="animate-slide-left mb-3 text-sm font-semibold uppercase tracking-widest text-lime-400" style="animation-delay: 0.1s;">
        Personal Trainer
      </p>
      <h1 class="animate-slide-left text-4xl font-bold leading-tight sm:text-5xl" style="animation-delay: 0.2s;">
        Antrenamente personalizate pentru rezultate reale
      </h1>
      <p class="animate-slide-left mt-5 text-base text-neutral-300" style="animation-delay: 0.35s;">
        Construiește forță, disciplină și încredere printr-un plan adaptat pentru tine.
      </p>
      <div class="animate-slide-left mt-8 flex flex-col gap-4 sm:flex-row sm:justify-center lg:justify-start" style="animation-delay: 0.5s;">
        <a href="#contact" class="rounded-full bg-lime-400 px-8 py-3 font-semibold text-neutral-950 transition-transform duration-200 hover:scale-105">
          Programează-te
        </a>
        <a href="#servicii" class="rounded-full border border-neutral-600 px-8 py-3 font-semibold text-white transition-transform duration-200 hover:scale-105">
          Vezi serviciile
        </a>
      </div>

      <!-- Statistici cu counter animat -->
      <div class="animate-slide-left mt-10 flex justify-center gap-8 lg:justify-start" style="animation-delay: 0.65s;">
        @for (stat of stats; track stat.label) {
        <div class="text-center">
          <p class="text-2xl font-bold text-lime-400">{{ stat.current }}{{ stat.suffix }}</p>
          <p class="text-xs text-neutral-400">{{ stat.label }}</p>
        </div>
        }
      </div>
    </div>

    <!-- Dreapta: poza antrenor -->
    <div class="animate-slide-right w-full max-w-sm flex-1 lg:max-w-none" style="animation-delay: 0.3s;">
      <div class="aspect-[3/4] w-full overflow-hidden rounded-3xl transition-transform duration-500 hover:scale-105">
        <img src="images/hero-trainer.webp"
             alt="Antrenor personal"
             class="h-full w-full object-cover object-top" />
      </div>
    </div>

  </div>
</section>
