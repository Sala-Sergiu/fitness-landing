<section id="servicii" class="px-6 py-16">
  <div class="mx-auto max-w-5xl">

    <div class="mb-10 text-center">
      <p class="animate-fade-in mb-2 text-sm font-semibold uppercase tracking-widest text-lime-400">
        Ce ofer
      </p>
      <h2 class="animate-fade-in text-3xl font-bold sm:text-4xl" style="animation-delay: 0.1s;">
        Servicii
      </h2>
      <p class="animate-fade-in mt-3 text-neutral-400" style="animation-delay: 0.2s;">
        Alege ce se potrivește cel mai bine obiectivelor tale.
      </p>
    </div>

    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-4">
      @for (service of services; track service.title; let i = $index) {
      <div class="group relative animate-slide-up rounded-2xl border border-neutral-800 bg-neutral-900 p-6 transition-all duration-300 hover:-translate-y-2 hover:border-lime-400/50 hover:bg-neutral-800 hover:shadow-xl hover:shadow-lime-400/10"
           [style.animation-delay]="i * 0.1 + 0.3 + 's'">
        <div class="mb-4 inline-flex h-14 w-14 items-center justify-center rounded-xl bg-lime-400/10 text-3xl transition-all duration-300 group-hover:scale-125 group-hover:bg-lime-400/20 group-hover:rotate-6">
          {{ service.icon }}
        </div>
        <div class="mb-4 h-0.5 w-8 rounded-full bg-lime-400 transition-all duration-300 group-hover:w-16"></div>
        <h3 class="text-lg font-semibold text-white transition-colors duration-300 group-hover:text-lime-400">
          {{ service.title }}
        </h3>
        <p class="mt-2 text-sm leading-relaxed text-neutral-400">{{ service.description }}</p>
        <div class="absolute right-4 top-4 h-16 w-16 rounded-full bg-lime-400/5 blur-xl transition-all duration-300 group-hover:bg-lime-400/15"></div>
      </div>
      }
    </div>

  </div>
</section>
